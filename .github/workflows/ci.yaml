name: Node.js CI

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: write
    strategy:
      matrix:
        node-version: [24.x, 23.x, 22.x, 21.x, 20.x, 19.x, 18.x]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run build
      - run: npm run build:mcp
      - run: npm run build:chromeos
      - run: npm run build:pime

  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: write
      id-token: write
    strategy:
      matrix:
        node-version: [24.x, 23.x, 22.x, 21.x, 20.x, 19.x, 18.x]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run test:coverage
        # continue-on-error: true
      - name: Jest Coverage Report
        if: matrix.node-version == '24.x'
        uses: ArtiomTr/jest-coverage-report-action@v2
      - name: Upload coverage reports to Codecov
        if: >
          matrix.node-version == '24.x' && 
          github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build_publish:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run build
      - run: npx typedoc --entryPointStrategy expand ./src --exclude "**/*.test.ts"
      - run: mv docs output/example/.
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: output/example
